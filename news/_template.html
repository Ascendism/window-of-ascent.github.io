<!--
  ═══════════════════════════════════════════════════════════════════════════
  WOA NEWS ARTICLE — FORMAT v1 (required for home-page embed)
  ═══════════════════════════════════════════════════════════════════════════

  FILE LOCATION
    docs/news/YYYY-MM-DD-slug.html
    Register the file in docs/data/news.json (file, date, title, summary).

  OPTIONAL learnMore (in news.json, on the same article object)
    "learnMore": {
      "headline": "Want to learn more about …?",
      "youtubeId": "YOUTUBE_VIDEO_ID"
    }
    Renders a video hero below that article on the home page (Video.js + YouTube).

  FRAGMENT ONLY
    No <!DOCTYPE>, <html>, <head>, or <body>. One root element:
      <article data-woa-news-article …>

  REQUIRED ATTRIBUTES (on root <article>)
    data-woa-news-article     — marks embeddable article (required)
    data-woa-news-id            — stable slug, e.g. 2026-05-17-data-centers-farmland
    data-woa-news-date          — ISO date YYYY-MM-DD (must match news.json)

  OPTIONAL ATTRIBUTES
    data-requires-chartjs       — present if any <script> uses Chart.js

  STRUCTURE (in order)
    1. <style data-woa-news-style>   — article-scoped CSS only (use .woa-news-* classes)
    2. <header class="woa-news-header"> — optional; title/date usually come from news.json
    3. <div class="woa-news-body">  — main prose, figures, chart <canvas> elements
    4. <script data-woa-news-script> — init charts/DOM; runs after embed on the home page

  EXTERNAL ASSETS (allowed)
    Images only, root-relative paths:
      /assets/news_imgs/your-image.png

  CHARTS
    Add data-requires-chartjs on <article>.
    Give each <canvas> a unique id (include article slug in the id).
    Initialize in data-woa-news-script after DOM embed.
    Site loader exposes: window.woaNewsChartReady (Promise, Chart.js from CDN).

  CLASS NAMING
    Prefix article-specific classes with woa-news- to avoid clashes with site.css.

  SCRIPTS
    Do not rely on inline event handlers (onclick=). Use data-woa-news-script blocks.
    Scripts are re-created on embed so they execute (innerHTML alone does not run scripts).

  ═══════════════════════════════════════════════════════════════════════════
-->

<article
  data-woa-news-article
  data-woa-news-id="YYYY-MM-DD-slug"
  data-woa-news-date="YYYY-MM-DD"
  data-requires-chartjs
>
  <style data-woa-news-style>
    /* .woa-news-body { } */
  </style>

  <div class="woa-news-body">
    <p>Replace with article prose.</p>
    <figure class="woa-news-figure">
      <img src="/assets/news_imgs/example.png" alt="" width="1200" height="675" loading="lazy">
      <figcaption>Caption.</figcaption>
    </figure>
    <figure class="woa-news-figure woa-news-figure--chart">
      <canvas id="woa-news-chart-example" role="img" aria-label="Chart description"></canvas>
      <figcaption>Chart caption. Label illustrative data if not from a primary source.</figcaption>
    </figure>
  </div>

  <script data-woa-news-script>
    (function () {
      // window.woaNewsChartReady.then(function (Chart) { … });
    })();
  </script>
</article>
